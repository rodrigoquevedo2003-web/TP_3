# Base H2 en memoria, en modo de compatibilidad con MySQL
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate crea el esquema desde las entidades y lo borra al terminar
spring.jpa.hibernate.ddl-auto=create-drop

# Evita que intente correr scripts de init de MySQL
spring.sql.init.mode=never

# Valores dummy para las variables que la app exige al arrancar.
# El JWT_SECRET DEBE tener 32+ caracteres por la validacion de JwtService.
jwt.secret=test-secret-de-al-menos-32-caracteres-1234
jwt.expiration=86400000

# Claves vacias/falsas: no se usan en el test de contexto
gemini.api-key=
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false